<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D4 Build Manager - Vitablo.de</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cinzel+Decorative:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(ellipse at top, rgba(139, 0, 0, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at bottom, rgba(20, 0, 0, 0.8) 0%, transparent 70%),
                linear-gradient(180deg, #0a0505 0%, #1a0808 50%, #0a0505 100%);
            color: #c8b8a8;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139, 0, 0, 0.03) 2px, rgba(139, 0, 0, 0.03) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(139, 0, 0, 0.03) 2px, rgba(139, 0, 0, 0.03) 4px);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            padding: 40px 0 30px;
            border-bottom: 3px solid #5a0000;
            margin-bottom: 30px;
            position: relative;
        }

        header::before {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff2200, transparent);
            box-shadow: 0 0 10px #ff2200;
        }

        header h1 {
            font-size: 2.5rem;
            font-family: 'Cinzel Decorative', cursive;
            color: #ff3300;
            text-shadow:
                0 0 10px rgba(255, 51, 0, 0.8),
                0 0 20px rgba(255, 51, 0, 0.5),
                0 0 40px rgba(139, 0, 0, 0.3),
                2px 2px 4px rgba(0, 0, 0, 0.8);
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        header p {
            color: #8a7060;
            font-size: 1rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .main-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .main-tab {
            padding: 15px 35px;
            background:
                linear-gradient(145deg, rgba(30, 10, 10, 0.95), rgba(15, 5, 5, 0.95)),
                linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%);
            border: 2px solid #3a1515;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1.1rem;
            font-weight: bold;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .main-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(139, 0, 0, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .main-tab:hover {
            border-color: #ff2200;
            transform: translateY(-3px);
            box-shadow:
                0 5px 20px rgba(255, 34, 0, 0.3),
                inset 0 0 20px rgba(139, 0, 0, 0.2);
        }

        .main-tab.active {
            border-color: #ff2200;
            background:
                linear-gradient(145deg, rgba(50, 15, 15, 0.95), rgba(25, 8, 8, 0.95)),
                linear-gradient(180deg, #3a1a1a 0%, #2a0a0a 100%);
            color: #ff4400;
            text-shadow: 0 0 10px rgba(255, 68, 0, 0.5);
            box-shadow:
                0 0 20px rgba(255, 34, 0, 0.4),
                inset 0 0 30px rgba(139, 0, 0, 0.3);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .class-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .class-card {
            background:
                linear-gradient(145deg, rgba(25, 10, 10, 0.9), rgba(12, 5, 5, 0.95)),
                linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%);
            border: 2px solid #3a1515;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .class-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top, rgba(139, 0, 0, 0.1) 0%, transparent 70%),
                repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(139, 0, 0, 0.02) 10px, rgba(139, 0, 0, 0.02) 20px);
            pointer-events: none;
        }

        .class-card:hover {
            border-color: #ff2200;
            transform: translateY(-5px) scale(1.02);
            box-shadow:
                0 8px 30px rgba(255, 34, 0, 0.25),
                inset 0 0 20px rgba(139, 0, 0, 0.2);
        }

        .class-card.active {
            border-color: #ff2200;
            background:
                linear-gradient(145deg, rgba(40, 15, 15, 0.9), rgba(20, 8, 8, 0.95)),
                linear-gradient(180deg, #3a1a1a 0%, #2a0a0a 100%);
            box-shadow:
                0 0 25px rgba(255, 34, 0, 0.4),
                inset 0 0 30px rgba(139, 0, 0, 0.3);
        }

        .class-card .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(139, 0, 0, 0.5));
            display: flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            margin: 0 auto 10px;
        }

        .class-card .icon img.class-icon-img {
            width: 64px;
            height: 64px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(139, 0, 0, 0.5));
        }

        .class-card h3 {
            color: #c8b8a8;
            font-size: 1rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .class-card .count {
            background: linear-gradient(135deg, #5a0000, #3a0000);
            color: #ff8800;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-top: 8px;
            display: inline-block;
            border: 1px solid #7a0000;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .warplans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
        }

        .warplan-card {
            background:
                linear-gradient(145deg, rgba(25, 10, 10, 0.9), rgba(12, 5, 5, 0.95)),
                linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%);
            border: 2px solid #3a1515;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .warplan-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at top right, rgba(139, 0, 0, 0.08) 0%, transparent 60%),
                repeating-linear-gradient(-45deg, transparent, transparent 15px, rgba(139, 0, 0, 0.015) 15px, rgba(139, 0, 0, 0.015) 30px);
            pointer-events: none;
        }

        .warplan-card:hover {
            border-color: #ff2200;
            transform: translateY(-3px);
            box-shadow:
                0 8px 25px rgba(255, 34, 0, 0.2),
                inset 0 0 20px rgba(139, 0, 0, 0.15);
        }

        .warplan-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #3a1515;
            position: relative;
            z-index: 1;
        }

        .warplan-icon {
            font-size: 2.5rem;
            filter: drop-shadow(0 0 8px rgba(139, 0, 0, 0.6));
        }

        .warplan-title {
            font-size: 1.4rem;
            color: #ffaa00;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.3);
            letter-spacing: 1px;
        }

        .warplan-section {
            background: rgba(10, 5, 5, 0.8);
            border: 1px solid #2a1010;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 15px;
            position: relative;
            z-index: 1;
        }

        .warplan-section h4 {
            color: #ff4400;
            margin-bottom: 12px;
            font-size: 1rem;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 8px rgba(255, 68, 0, 0.4);
            letter-spacing: 0.5px;
        }

        .warplan-section ul {
            list-style: none;
            padding: 0;
        }

        .warplan-section li {
            padding: 8px 0;
            padding-left: 20px;
            position: relative;
            color: #ccc;
            line-height: 1.4;
        }

        .warplan-section li:before {
            content: "▸";
            position: absolute;
            left: 0;
            color: #ff6600;
        }

        .warplan-section li strong {
            color: #ffcc00;
        }

        .builds-section {
            display: none;
        }

        .builds-section.active {
            display: block;
        }

        .section-title {
            font-size: 1.5rem;
            color: #ff4400;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #3a1515;
            font-family: 'Cinzel Decorative', cursive;
            text-shadow: 0 0 15px rgba(255, 68, 0, 0.4);
            letter-spacing: 1px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, #ff2200, transparent);
            box-shadow: 0 0 10px #ff2200;
        }

        .build-card {
            background:
                linear-gradient(145deg, rgba(25, 10, 10, 0.9), rgba(12, 5, 5, 0.95)),
                linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%);
            border: 2px solid #3a1515;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .build-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top left, rgba(139, 0, 0, 0.05) 0%, transparent 70%);
            pointer-events: none;
        }

        .build-card:hover {
            border-color: #5a2020;
            box-shadow: 0 5px 20px rgba(139, 0, 0, 0.15);
        }

        .build-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .build-title {
            font-size: 1.2rem;
            color: #ffaa00;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 8px rgba(255, 170, 0, 0.3);
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .build-tier {
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.85rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            border: 1px solid rgba(0, 0, 0, 0.3);
        }

        .tier-s {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a0a0a;
            box-shadow:
                0 0 15px rgba(255, 215, 0, 0.5),
                inset 0 0 10px rgba(255, 255, 255, 0.2);
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
        }

        .tier-a {
            background: linear-gradient(135deg, #aa00ff, #7700cc);
            color: white;
            box-shadow: 0 0 15px rgba(170, 0, 255, 0.4);
        }

        .tier-b {
            background: linear-gradient(135deg, #0088ff, #0055bb);
            color: white;
            box-shadow: 0 0 15px rgba(0, 136, 255, 0.4);
        }

        .tier-c {
            background: linear-gradient(135deg, #555, #333);
            color: #aaa;
        }

        .build-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #7a6060;
            flex-wrap: wrap;
        }

        .build-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .build-content {
            display: none;
        }

        .build-content.expanded {
            display: block;
        }

        .build-content h4 {
            color: #ff4400;
            margin: 15px 0 10px;
            font-size: 1rem;
            font-family: 'Cinzel', serif;
            text-shadow: 0 0 8px rgba(255, 68, 0, 0.4);
            letter-spacing: 0.5px;
        }

        .skill-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .skill-item {
            background: rgba(10, 5, 5, 0.8);
            border: 1px solid #2a1010;
            padding: 8px 14px;
            border-radius: 6px;
            border-left: 3px solid #5a0000;
            font-size: 0.85rem;
            color: #a89888;
            transition: all 0.3s ease;
        }

        .skill-item:hover {
            background: rgba(20, 8, 8, 0.8);
            border-left-color: #ff2200;
            color: #c8b8a8;
        }

        .warplan-textarea {
            width: 100%;
            background:
                linear-gradient(145deg, rgba(10, 4, 4, 0.95), rgba(5, 2, 2, 0.98)),
                linear-gradient(180deg, #0a0505 0%, #050202 100%);
            border: 2px solid #2a1010;
            border-radius: 6px;
            color: #c8b8a8;
            padding: 12px;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
            transition: all 0.3s ease;
        }

        .warplan-textarea:focus {
            outline: none;
            border-color: #ff2200;
            box-shadow:
                0 0 15px rgba(255, 34, 0, 0.25),
                inset 0 0 15px rgba(139, 0, 0, 0.15);
            color: #e8d8c8;
        }

        .warplan-textarea::placeholder {
            color: #5a4545;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .btn-expand {
            background:
                linear-gradient(145deg, #3a2020, #2a1515),
                linear-gradient(180deg, #2a1a1a 0%, #1a0a0a 100%);
            color: #a89888;
            border: 1px solid #4a2525;
        }

        .btn-expand:hover {
            background:
                linear-gradient(145deg, #4a2525, #3a1a1a),
                linear-gradient(180deg, #3a2020 0%, #2a1515 100%);
            color: #c8b8a8;
            box-shadow: 0 0 15px rgba(139, 0, 0, 0.3);
        }

        .btn-save {
            background: linear-gradient(135deg, #ff3300, #aa0000);
            color: white;
            margin-top: 10px;
            border: 1px solid #ff4400;
            box-shadow: 0 0 15px rgba(255, 51, 0, 0.4);
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.5);
        }

        .btn-save:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 51, 0, 0.7);
        }

        .btn-copy {
            background: linear-gradient(135deg, #2a3a5a, #1a2a4a);
            color: #8aaadd;
            font-size: 0.75rem;
            padding: 5px 12px;
            border: 1px solid #3a4a6a;
            font-family: 'Cinzel', serif;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, #3a4a7a, #2a3a6a);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
        }

        .vitalo-link {
            color: #ff6600;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            text-shadow: 0 0 8px rgba(255, 102, 0, 0.3);
            transition: all 0.3s ease;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
        }

        .vitalo-link:hover {
            text-decoration: none;
            color: #ff8833;
            text-shadow: 0 0 15px rgba(255, 102, 0, 0.6);
        }

        .stats-bar {
            background:
                linear-gradient(145deg, rgba(20, 8, 8, 0.95), rgba(10, 4, 4, 0.98)),
                linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%);
            border: 2px solid #3a1515;
            padding: 18px 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            box-shadow:
                0 5px 20px rgba(0, 0, 0, 0.4),
                inset 0 0 30px rgba(139, 0, 0, 0.1);
        }

        .stat-item {
            text-align: center;
            position: relative;
        }

        .stat-value {
            font-size: 1.8rem;
            color: #ff4400;
            font-weight: bold;
            font-family: 'Cinzel Decorative', cursive;
            text-shadow:
                0 0 10px rgba(255, 68, 0, 0.6),
                0 0 20px rgba(139, 0, 0, 0.4);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #7a6060;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .search-box {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 25px;
            background:
                linear-gradient(145deg, rgba(20, 8, 8, 0.95), rgba(10, 4, 4, 0.98)),
                linear-gradient(180deg, #1a0a0a 0%, #0a0505 100%);
            border: 2px solid #3a1515;
            border-radius: 25px;
            color: #c8b8a8;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: #ff2200;
            box-shadow:
                0 0 15px rgba(255, 34, 0, 0.3),
                inset 0 0 20px rgba(139, 0, 0, 0.2);
            color: #e8d8c8;
        }

        .search-box input::placeholder {
            color: #6a5050;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 10px 18px;
            background:
                linear-gradient(145deg, rgba(25, 10, 10, 0.9), rgba(12, 5, 5, 0.95)),
                linear-gradient(180deg, #2a1515 0%, #1a0a0a 100%);
            border: 2px solid #3a1515;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.85rem;
            font-family: 'Cinzel', serif;
            letter-spacing: 0.5px;
            color: #a89888;
        }

        .filter-tab:hover {
            border-color: #ff2200;
            color: #c8b8a8;
            box-shadow: 0 0 15px rgba(255, 34, 0, 0.25);
        }

        .filter-tab.active {
            background:
                linear-gradient(145deg, rgba(50, 15, 15, 0.9), rgba(25, 8, 8, 0.95)),
                linear-gradient(180deg, #3a1a1a 0%, #2a0a0a 100%);
            border-color: #ff2200;
            color: #ff4400;
            text-shadow: 0 0 8px rgba(255, 68, 0, 0.5);
            box-shadow:
                0 0 20px rgba(255, 34, 0, 0.4),
                inset 0 0 20px rgba(139, 0, 0, 0.2);
        }

        .build-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .build-notes {
            background: rgba(10, 5, 5, 0.6);
            border: 1px solid #2a1010;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }

        .build-notes textarea {
            width: 100%;
            background:
                linear-gradient(145deg, rgba(10, 4, 4, 0.95), rgba(5, 2, 2, 0.98)),
                linear-gradient(180deg, #0a0505 0%, #050202 100%);
            border: 2px solid #2a1010;
            border-radius: 6px;
            color: #c8b8a8;
            padding: 10px;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .build-notes textarea:focus {
            outline: none;
            border-color: #ff2200;
            box-shadow:
                0 0 15px rgba(255, 34, 0, 0.25),
                inset 0 0 15px rgba(139, 0, 0, 0.15);
            color: #e8d8c8;
        }

        .build-notes textarea::placeholder {
            color: #5a4545;
        }

        .saved-indicator {
            color: #44aa66;
            font-size: 0.8rem;
            margin-left: 10px;
            text-shadow: 0 0 8px rgba(68, 170, 102, 0.4);
            font-family: 'Cinzel', serif;
        }

        .hot-badge {
            background: linear-gradient(135deg, #ff3300, #cc0000);
            color: white;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: bold;
            animation: pulse-fire 2s infinite;
            border: 1px solid #ff4400;
            box-shadow:

        .tooltip-label {
            color: #7a6060;
        }

        .tooltip-value {
            color: #c8b8a8;
        }

        /* Skill Editor Modal */
        .skill-editor-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;

            height: 100%;

            align-items: center;

        }

        .skill-editor-modal.active {
            display: flex;
        }

        .skill-editor-content {
            background: linear-gradient(145deg, rgba(25, 10, 10, 0.95), rgba(12, 5, 5, 0.98));
            border: 2px solid #5a2020;

            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;

        }

        .skill-editor-header {
            display: flex;

            border-bottom: 2px solid #3a1515;
        }

        .skill-editor-header h3 {
            color: #ff4400;
            font-family: 'Cinzel', serif;
            font-size: 1.3rem;
        }

        .skill-editor-close {

<body>
    <div class="container">
        <header>
            <h1>⚔️ D4 Build Manager</h1>
            <p>Deine vitablo.de Build-Übersicht für Diablo 4 - Lord of Hatred</p>
        </header>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="total-builds">0</div>
                <div class="stat-label">Builds gesamt</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="s-tier-count">0</div>

                <div class="stat-label">Deine Notizen</div>

        </div>

        <!-- Haupt-Tabs -->
        <div class="main-tabs">
            <div class="main-tab active" onclick="switchMainTab('builds')">🎮 Klassen-Builds</div>
            <div class="main-tab" onclick="switchMainTab('warplans')">⚔️ Kriegspläne</div>
        </div>

        <!-- Klassen-Builds Tab -->
        <div class="tab-content active" id="tab-builds">

            <div class="filter-tabs">
                <div class="filter-tab active" data-filter="all">Alle</div>
                <div class="filter-tab" data-filter="s-tier">S-Tier</div>
                <div class="filter-tab" data-filter="a-tier">A-Tier</div>

            <h2 style="color: #ff6600; margin-bottom: 20px; text-align: center;">Wähle eine Klasse</h2>

            <div class="class-grid" id="class-grid"></div>

            <div id="builds-container"></div>
        </div>

        <!-- Kriegspläne Tab -->

            <div class="lightbox-counter" id="lightbox-counter"></div>

        <!-- Skill-Editor Modal -->
        <div class="skill-editor-modal" id="skill-editor-modal">
            <div class="skill-editor-content">

                    <button class="skill-editor-close" onclick="closeSkillEditor()">&times;</button>
                </div>

                <div class="skill-editor-field">
                    <label>Skill Icon</label>
                    <input type="text" id="edit-skill-icon" placeholder="🌿" maxlength="2">
                </div>

                <div class="skill-editor-field">
                    <label>Skill Name (Deutsch)</label>
                    <input type="text" id="edit-skill-name" placeholder="Erdspieß">
                </div>

                <div class="skill-editor-field">
                    <label>Skill Name (Englisch)</label>
                    <input type="text" id="edit-skill-english" placeholder="Earthen Spike">
                </div>

                <div class="skill-editor-field">
                    <label>Priority Level: <span id="priority-value">1</span></label>
                    <input type="range" id="edit-skill-priority" min="1" max="99" value="1" oninput="document.getElementById('priority-value').textContent = this.value">
                    <div class="priority-groups">
                        <button class="priority-group-btn early" onclick="setPriority(1)">Early (1)</button>
                        <button class="priority-group-btn early" onclick="setPriority(5)">Early (5)</button>
                        <button class="priority-group-btn mid" onclick="setPriority(7)">Mid (7)</button>
                        <button class="priority-group-btn mid" onclick="setPriority(12)">Mid (12)</button>
                        <button class="priority-group-btn late" onclick="setPriority(15)">Late (15)</button>
                        <button class="priority-group-btn late" onclick="setPriority(50)">Late (50)</button>
                    </div>
                </div>

                <div class="skill-editor-field">
                    <label>Max Level</label>
                    <input type="number" id="edit-skill-maxLevel" min="1" max="99" value="15">
                </div>

                <div class="skill-editor-actions">
                    <button class="btn btn-save" onclick="saveSkillEditor()">💾 Speichern</button>
                    <button class="btn btn-expand" onclick="closeSkillEditor()">Abbrechen</button>
                </div>
            </div>
        </div>

        <div class="export-section">
            <h3>💾 Daten verwalten</h3>
            <button class="btn export-btn" onclick="exportData()">Daten exportieren</button>
            <button class="btn export-btn" onclick="importData()">Daten importieren</button>
            <button class="btn export-btn" onclick="clearData()">Alles löschen</button>
        </div>
    </div>

        // Prüfen ob die Extension verfügbar ist und Daten laden
        async function loadFromExtension() {
            // Prüfen ob chrome API verfügbar ist
            if (typeof chrome !== 'undefined' && chrome.storage && chrome.storage.local) {
                try {
                    const result = await new Promise((resolve, reject) => {
                        chrome.storage.local.get('vitabloBuilds', (data) => {
                            if (chrome.runtime.lastError) {
                                reject(chrome.runtime.lastError);
                            } else {
                                resolve(data);
                            }
                        });
                    });

                    if (result.vitabloBuilds && result.vitabloBuilds.builds) {
                        extensionBuilds = result.vitabloBuilds.builds;
                        extensionAvailable = true;
                        mergeExtensionBuilds();
                        showExtensionNotification();
                    }
                } catch (error) {
                    console.log('Keine Extension-Daten verfügbar:', error);
                }
            }

        // Erstelle einen Skill-Baum aus Extension-Skills mit Priority-Daten
        function createSkillTreeFromExtension(skills, buildName) {
            // Finde den Root-Skill (niedrigste Priority oder erster Skill)
            const sortedSkills = [...skills].sort((a, b) => (a.priority || 99) - (b.priority || 99));
            const rootSkill = sortedSkills[0];

            if (!rootSkill) return null;

            const skillTree = {
                id: rootSkill.german?.toLowerCase().replace(/\s+/g, '-') || 'root',
                name: rootSkill.german || rootSkill.name || 'Unknown',
                icon: extractSkillIcon(rootSkill),
                priority: rootSkill.priority || 1,
                maxLevel: rootSkill.maxLevel || 15,
                german: rootSkill.german || rootSkill.name || '',
                english: rootSkill.english || '',
                children: []
            };

            // Füge die restlichen Skills als Children hinzu
            sortedSkills.slice(1).forEach(skill => {
                skillTree.children.push({
                    id: skill.german?.toLowerCase().replace(/\s+/g, '-') || Math.random().toString(36).substr(2, 9),
                    name: skill.german || skill.name || 'Unknown',
                    icon: extractSkillIcon(skill),
                    priority: skill.priority || 1,
                    maxLevel: skill.maxLevel || 15,
                    german: skill.german || skill.name || '',
                    english: skill.english || ''
                });
            });

            return skillTree;

        // Skill-Kategorie basierend auf Skill-Namen ermitteln
        function getSkillCategory(skillName) {
            const name = skillName.toLowerCase();
            if (name.includes('volley') || name.includes('salve') || name.includes('quill')) return 'core';
            if (name.includes('hand') || name.includes('claws') || name.includes('fist')) return 'core';
            if (name.includes('spike') || name.includes('spieß')) return 'basic';
            if (name.includes('orb') || name.includes('bolt') || name.includes('ball')) return 'core';
            if (name.includes('nova') || name.includes('armor') || name.includes('shield')) return 'defensive';
            if (name.includes('step') || name.includes('dash') || name.includes('leap')) return 'defensive';
            if (name.includes('raven') || name.includes('wolf') || name.includes('bear')) return 'potency';
            return 'basic';
        }

        // Deutscher Skill-Name zu Dateiname konvertieren
        function germanToFilename(germanName) {
            const normalized = germanName.toLowerCase()
                .replace(/ä/g, 'ae')
                .replace(/ö/g, 'oe')
                .replace(/ü/g, 'ue')
                .replace(/ß/g, 'ss')
                .replace(/\s+/g, '-')
                .replace(/[^a-z0-9-]/g, '');
            return normalized;
        }

        // Skill-Icon-Pfad generieren
        function getSkillIconPath(classKey, skillName, skillType = 'basic') {
            const folder = classIconFolderMap[classKey] || classKey;
            const filename = germanToFilename(skillName);
            const basePath = `icons/diablo4_icon_pack_template/icons/${folder}`;

            // Verschiedene Kategorien versuchen
            const categories = ['core', 'basic', 'defensive', 'potency', 'ultimate', 'focus'];

            for (const cat of categories) {
                const path = `${basePath}/${cat}/${filename}.svg`;
                return path; // Wir geben den Pfad zurück, das onerror im img-Tag handled das Fallback
            }

            return `${basePath}/basic/${filename}.svg`;
        }

        // Extrahiere ein Icon für den Skill (mit SVG-Fallback)
        function getSkillIconWithFallback(classKey, skill) {
            const svgPath = getSkillIconPath(classKey, skill.german || skill.name);

            // Emoji-Fallback für verschiedene Skill-Typen
            const emojiFallback = getEmojiForSkill(skill);

            return {
                svg: svgPath,
                emoji: emojiFallback,
                useSvg: true // Standardmäßig SVG versuchen
            };
        }

        // Emoji-Fallback für Skills
        function getEmojiForSkill(skill) {
            const name = skill.german?.toLowerCase() || skill.name?.toLowerCase() || '';
            const iconMap = {
                'erdspieß': '🌿', 'earth': '🌿',
                'uberwaeltigung': '💥', 'overpower': '💥',

            };

            for (const [key, icon] of Object.entries(iconMap)) {
                if (name.includes(key)) return icon;
            }

            return '⚔️';
        }

        function extractSkillIcon(skill) {

        // Extension-Builds mit den statischen Daten zusammenführen
        function mergeExtensionBuilds() {
            if (!extensionBuilds || extensionBuilds.length === 0) return;

            extensionBuilds.forEach(extBuild => {
                // Versuche, den Build in den vorhandenen Daten zu finden
                let found = false;

                Object.entries(buildsData).forEach(([classKey, classData]) => {
                    const existingBuild = classData.builds.find(b =>
                        b.vitabloUrl === extBuild.url ||
                        b.name.toLowerCase().includes(extBuild.name?.toLowerCase()) ||
                        extBuild.name?.toLowerCase().includes(b.name.toLowerCase())
                    );

                    if (existingBuild) {
                        // Erweitere den existierenden Build mit Extension-Daten
                        if (extBuild.skills && extBuild.skills.length > 0) {
                            existingBuild.extensionSkills = extBuild.skills;

                            // Erstelle automatisch einen Skill-Baum wenn Priority-Daten vorhanden sind
                            const skillsWithPriority = extBuild.skills.filter(s => s.priority);
                            if (skillsWithPriority.length > 0 && !existingBuild.skillTree) {
                                existingBuild.skillTree = createSkillTreeFromExtension(skillsWithPriority, existingBuild.name);
                            }
                        }
                        if (extBuild.aspects) {
                            existingBuild.aspects = extBuild.aspects;
                        }
                        if (extBuild.legendaryAspects) {
                            existingBuild.legendaryAspects = extBuild.legendaryAspects;
                        }
                        if (extBuild.items) {
                            existingBuild.items = extBuild.items;
                        }
                        if (extBuild.talisman) {
                            existingBuild.talisman = extBuild.talisman;
                        }
                        if (extBuild.paragon) {
                            existingBuild.extensionParagon = extBuild.paragon;
                        }
                        if (extBuild.soulbearer) {
                            existingBuild.soulbearer = extBuild.soulbearer;
                        }
                        if (extBuild.mercenary) {
                            existingBuild.mercenary = extBuild.mercenary;
                        }
                        existingBuild.fromExtension = true;
                        found = true;
                    }
                });

                // Wenn nicht gefunden, als neuen Build hinzufügen
                if (!found && extBuild.name) {
                    const classKey = mapClassToKey(extBuild.class);
                    if (classKey && buildsData[classKey]) {
                        buildsData[classKey].builds.push({
                            id: `ext-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`,
                            name: extBuild.name,
                            tier: 'B',
                            hot: false,
                            type: 'Von Vitablo extrahiert',
                            description: 'Automatisch von der Vitablo Extension extrahiert.',
                            skills: extBuild.skills || [],
                            vitabloUrl: extBuild.url,
                            fromExtension: true,
                            aspects: extBuild.aspects,
                            legendaryAspects: extBuild.legendaryAspects,
                            items: extBuild.items,
                            talisman: extBuild.talisman,
                            paragon: extBuild.paragon,
                            soulbearer: extBuild.soulbearer,
                            mercenary: extBuild.mercenary
                        });
                    }
                }
            });

            // UI aktualisieren
            renderClassGrid();
            updateStats();
        }

            currentLightboxIndex = index;
            const lightbox = document.getElementById('lightbox');
            const lightboxImage = document.getElementById('lightbox-image');
            const counter = document.getElementById('lightbox-counter');

            lightboxImage.src = screenshots[index];
            counter.textContent = `${index + 1} / ${screenshots.length}`;
            lightbox.classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        function navigateLightbox(direction) {
            currentLightboxIndex += direction;
            if (currentLightboxIndex < 0) currentLightboxIndex = screenshots.length - 1;
            if (currentLightboxIndex >= screenshots.length) currentLightboxIndex = 0;

            document.getElementById('lightbox-image').src = screenshots[currentLightboxIndex];
            document.getElementById('lightbox-counter').textContent = `${currentLightboxIndex + 1} / ${screenshots.length}`;
        }

        // Lightbox mit ESC schließen und Pfeiltasten navigieren
        document.addEventListener('keydown', function(e) {
            const lightbox = document.getElementById('lightbox');
            if (!lightbox.classList.contains('active')) return;

            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        // Lightbox schließen wenn außerhalb des Bildes geklickt wird
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });

        // Builds anzeigen
        function showBuilds(classKey) {
            document.querySelectorAll('.class-card').forEach(card => {
                card.classList.toggle('active', card.dataset.class === classKey);
            });

            const classData = buildsData[classKey];
            const container = document.getElementById('builds-container');

            container.innerHTML = `
                <div class="builds-section active">
                    <h2 class="section-title">${classData.icon} ${classData.name} Builds</h2>
                    <div id="builds-list"></div>
                </div>
            `;

            renderBuilds(classKey);
        }

        // Build-Liste rendern
        function renderBuilds(classKey) {
            const classData = buildsData[classKey];
            const list = document.getElementById('builds-list');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const activeFilter = document.querySelector('.filter-tab.active').dataset.filter;

            list.innerHTML = '';

            classData.builds.forEach(build => {
                if (searchTerm && !build.name.toLowerCase().includes(searchTerm)) return;
                if (activeFilter === 's-tier' && build.tier !== 'S') return;
                if (activeFilter === 'a-tier' && build.tier !== 'A') return;
                if (activeFilter === 'hot' && !build.hot) return;

                const savedNote = savedData[build.id]?.note || '';
                const savedWarplan = savedData[build.id]?.warplan || '';

                const buildEl = document.createElement('div');
                buildEl.className = 'build-card';
                buildEl.dataset.tier = build.tier;
                buildEl.dataset.hot = build.hot;
                buildEl.innerHTML = `
                    <div class="build-header">
                        <div class="build-title">
                            ${build.hot ? '<span class="hot-badge">HOT</span>' : ''}
                            ${build.name}
                        </div>
                        <div class="build-tier tier-${build.tier.toLowerCase()}">${build.tier}-Tier</div>
                    </div>
                    <div class="build-meta">
                        <span>📋 ${build.type}</span>
                        <span>🔗 <a href="${build.vitabloUrl}" target="_blank" class="vitalo-link">vitablo.de</a></span>
                        <button class="btn btn-copy" onclick="copyBuildLink('${build.vitabloUrl}')">📋 Link kopieren</button>
                    </div>
                    <p style="color: #aaa; margin-bottom: 10px;">${build.description}</p>
                    <button class="btn btn-expand" onclick="toggleBuild('${build.id}')">▼ Details anzeigen</button>
                    <div class="build-content" id="content-${build.id}">
                        ${build.skillTree ? `
                        <div class="skill-tree-container">
                            <div class="skill-tree-header">
                                <h4>🌳 Skill-Baum</h4>
                                <button class="skill-tree-toggle" id="skill-tree-toggle-${build.id}" onclick="toggleSkillTree('${build.id}')">🌳 Skill-Baum anzeigen</button>
                            </div>
                            <div class="skill-tree" id="skill-tree-${build.id}"></div>
                        </div>
                        ` : ''}
                        <h4>⚔️ Skills</h4>
                        <div class="skill-list">
                            ${build.extensionSkills ?
                                build.extensionSkills.map(skill => `
                                    <div class="skill-item">
                                        ${skill.imageUrl ? `<img src="${skill.imageUrl}" style="width:24px;height:24px;margin-right:5px;vertical-align:middle;">` : ''}
                                        ${skill.german || skill.name}${skill.english ? `<br><small style="color:#888;">${skill.english}</small>` : ''}
                                    </div>
                                `).join('') :
                                build.skills.map(skill => `<div class="skill-item">${skill}</div>`).join('')
                            }
                        </div>

                        ${build.aspects || build.legendaryAspects ? `
                        <h4>🔮 Aspekte</h4>
                        <div class="skill-list">
                            ${build.aspects ? build.aspects.map(a => `<div class="skill-item">${a.name}</div>`).join('') : ''}
                            ${build.legendaryAspects ? build.legendaryAspects.map(a => `<div class="skill-item">⭐ ${a.name}</div>`).join('') : ''}
                        </div>
                        ` : ''}

                        ${build.items ? `
                        <h4>🎒 Items</h4>
                        <div class="skill-list">
                            ${build.items.map(item => `
                                <div class="skill-item" style="border-left-color: ${
                                    item.rarity === 'unique' ? '#ffaa00' :
                                    item.rarity === 'mythic' ? '#ff00ff' :
                                    item.rarity === 'legendary' ? '#ff6600' : '#5a0000'
                                };">
                                    ${item.name}
                                </div>
                            `).join('')}
                        </div>
                        ` : ''}

                        ${build.talisman && (build.talisman.items || build.talisman.runes) ? `
                        <h4>📿 Talisman & Runen</h4>
                        <div class="skill-list">
                            ${build.talisman.items ? build.talisman.items.map(t => `<div class="skill-item">${t}</div>`).join('') : ''}
                            ${build.talisman.runes ? build.talisman.runes.map(r => `<div class="skill-item">🔷 ${r}</div>`).join('') : ''}
                        </div>
                        ` : ''}

                        ${build.soulbearer && build.soulbearer.active ? `
                        <h4>👻 Seelenträger</h4>
                        <div class="skill-item">${build.soulbearer.name || 'Aktiv'}</div>
                        ` : ''}

                        ${build.mercenary && build.mercenary.active ? `
                        <h4>🤝 Söldner</h4>
                        <div class="skill-item">${build.mercenary.name || 'Aktiv'}</div>
                        ${build.mercenary.skills ? `
                        <div class="skill-list" style="margin-top:10px;">
                            ${build.mercenary.skills.map(s => `<div class="skill-item">${s}</div>`).join('')}
                        </div>
                        ` : ''}
                        ` : ''}

                        <h4>📊 Paragon / Kriegsplan</h4>
                        <div class="warplan-section">
                            <p style="color: #888; margin-bottom: 10px; font-size: 0.9rem;">${build.paragon}</p>
                            <textarea class="warplan-textarea" id="warplan-${build.id}" placeholder="Deine eigenen Kriegspläne hier notieren...">${savedWarplan}</textarea>
                        </div>

                        <h4>📝 Deine Notizen</h4>
                        <div class="build-notes">
                            <textarea id="note-${build.id}" placeholder="Tipps, Verbesserungen, Item-Notizen...">${savedNote}</textarea>
                        </div>

                        <div class="build-actions">
                            <button class="btn btn-save" onclick="saveBuildData('${build.id}')">💾 Speichern</button>
                            ${build.fromExtension ? '<span style="color:#4CAF50;font-size:0.75rem;margin-left:auto;">🔄 Von Extension</span>' : ''}
                            <span class="saved-indicator" id="saved-${build.id}" style="display: none;">✓ Gespeichert!</span>
                        </div>
                    </div>
                `;
                list.appendChild(buildEl);
            });
        }

        // Build ein-/ausblenden
        function toggleBuild(buildId) {
            const content = document.getElementById(`content-${buildId}`);
            const btn = content.previousElementSibling;

            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                btn.textContent = '▼ Details anzeigen';
            } else {
                content.classList.add('expanded');
                btn.textContent = '▲ Details ausblenden';

                // Skill-Baum rendern wenn vorhanden
                const activeClass = document.querySelector('.class-card.active');
                if (activeClass) {
                    const classKey = activeClass.dataset.class;
                    const classData = buildsData[classKey];
                    const build = classData.builds.find(b => b.id === buildId);
                    if (build && build.skillTree) {
                        setTimeout(() => {
                            renderSkillTree(build.skillTree, `skill-tree-${buildId}`, classKey);
                        }, 100);
                    }
                }
            }
        }

        // Build-Daten speichern
        function saveBuildData(buildId) {
            const note = document.getElementById(`note-${buildId}`).value;
            const warplan = document.getElementById(`warplan-${buildId}`).value;

            if (!savedData[buildId]) {
                savedData[buildId] = {};
            }

            savedData[buildId].note = note;
            savedData[buildId].warplan = warplan;
            savedData[buildId].updatedAt = new Date().toISOString();

            localStorage.setItem('d4Builds', JSON.stringify(savedData));

            const indicator = document.getElementById(`saved-${buildId}`);
            indicator.style.display = 'inline';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);

            updateStats();
        }

        // Kriegsplan-Notiz speichern
        function saveWarplanNote(warplanId) {
            const note = document.getElementById(`note-warplan-${warplanId}`).value;

            if (!savedData[`warplan-${warplanId}`]) {
                savedData[`warplan-${warplanId}`] = {};
            }

            savedData[`warplan-${warplanId}`].note = note;
            savedData[`warplan-${warplanId}`].updatedAt = new Date().toISOString();

            localStorage.setItem('d4Builds', JSON.stringify(savedData));

            const indicator = document.getElementById(`saved-warplan-${warplanId}`);
            indicator.style.display = 'inline';
            setTimeout(() => {
                indicator.style.display = 'none';
            }, 2000);

            updateStats();
        }

        // Skill-Baum rendern
        function renderSkillTree(skillTree, containerId, classKey = 'spiritborn') {
            if (!skillTree || !skillTree.children) return;

            const container = document.getElementById(containerId);
            if (!container) return;

            container.innerHTML = '';

            // Root-Node
            const rootNode = createSkillNode(skillTree, true, classKey);
            container.appendChild(rootNode);

            // Child-Nodes gruppieren nach Priority
            const grouped = {
                early: skillTree.children.filter(s => s.priority <= 5),
                mid: skillTree.children.filter(s => s.priority > 5 && s.priority <= 12),
                late: skillTree.children.filter(s => s.priority > 12)
            };

            // Child-Nodes hinzufügen
            skillTree.children.forEach(skill => {
                const childNode = createSkillNode(skill, false, classKey);
                container.appendChild(childNode);
            });
        }

        function createSkillNode(skill, isRoot, classKey = 'spiritborn') {
            const node = document.createElement('div');
            node.className = `skill-node ${isRoot ? 'root-node' : 'child-node'}`;

            // Priority-Klasse bestimmen
            let priorityClass = 'priority-early';
            if (skill.priority > 5 && skill.priority <= 12) priorityClass = 'priority-mid';
            if (skill.priority > 12) priorityClass = 'priority-late';

            // Icon mit SVG-Fallback generieren
            const iconHtml = generateSkillIconHtml(classKey, skill);

            node.innerHTML = `
                <div class="skill-icon">${iconHtml}</div>
                <div class="skill-info">
                    <div class="skill-name">${skill.name}</div>
                    ${skill.english ? `<div class="skill-name-english">${skill.english}</div>` : ''}
                </div>
                <div class="skill-level-badge">
                    <div class="level-priority ${priorityClass}">${skill.priority}</div>
                    ${skill.maxLevel ? `<div class="level-max">/${skill.maxLevel}</div>` : ''}
                </div>
            `;

            // Click-Handler für Editor
            node.addEventListener('click', (e) => {
                e.stopPropagation();
                openSkillEditor(skill, isRoot);
            });

            // Hover-Tooltip
            node.addEventListener('mouseenter', (e) => {
                showSkillTooltip(e, skill);
            });

            node.addEventListener('mouseleave', () => {
                hideSkillTooltip();
            });

            return node;
        }

        // Generiere Icon-HTML mit SVG-Fallback
        function generateSkillIconHtml(classKey, skill) {
            const emoji = getEmojiForSkill(skill);
            const svgPath = getSkillIconPath(classKey, skill.german || skill.name);

            return `<img src="${svgPath}" alt="${skill.name}" class="skill-icon-svg" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';"><span style="display:none;">${emoji}</span>`;
        }

        function showSkillTooltip(e, skill) {
            let tooltip = document.getElementById('skill-tree-tooltip');
            if (!tooltip) {
                tooltip = document.createElement('div');
                tooltip.id = 'skill-tree-tooltip';
                tooltip.className = 'skill-tree-tooltip';
                document.body.appendChild(tooltip);
            }

            let priorityPhase = 'Early Game';
            if (skill.priority > 5 && skill.priority <= 12) priorityPhase = 'Mid Game';
            if (skill.priority > 12) priorityPhase = 'Late Game';

            tooltip.innerHTML = `
                <div class="tooltip-header">
                    <div class="tooltip-icon">${skill.icon || '⚔️'}</div>
                    <div>
                        <div class="tooltip-title">${skill.name}</div>
                        <div class="tooltip-subtitle">${skill.english || ''}</div>
                    </div>
                </div>
                <div class="tooltip-info">
                    <span class="tooltip-label">Priority Level:</span>
                    <span class="tooltip-value">${skill.priority}</span>
                    <span class="tooltip-label">Phase:</span>
                    <span class="tooltip-value">${priorityPhase}</span>
                    ${skill.maxLevel ? `
                    <span class="tooltip-label">Max Level:</span>
                    <span class="tooltip-value">${skill.maxLevel}</span>
                    ` : ''}
                </div>
            `;

            // Position
            const rect = e.target.getBoundingClientRect();
            tooltip.style.left = rect.right + 10 + 'px';
            tooltip.style.top = rect.top + 'px';

            tooltip.classList.add('active');
        }

        function hideSkillTooltip() {
            const tooltip = document.getElementById('skill-tree-tooltip');
            if (tooltip) {
                tooltip.classList.remove('active');
            }
        }

        // Skill-Baum umschalten
        function toggleSkillTree(buildId) {
            const tree = document.getElementById(`skill-tree-${buildId}`);
            const btn = document.getElementById(`skill-tree-toggle-${buildId}`);

            if (tree.classList.contains('active')) {
                tree.classList.remove('active');
                btn.textContent = '🌳 Skill-Baum anzeigen';
            } else {
                tree.classList.add('active');
                btn.textContent = '🌳 Skill-Baum ausblenden';
            }
        }

        // Skill-Editor öffnen
        function openSkillEditor(skill, isRoot) {
            const modal = document.getElementById('skill-editor-modal');
            if (!modal) {
                console.error('Skill-Editor Modal nicht gefunden!');
                return;
            }

            document.getElementById('edit-skill-icon').value = skill.icon || '';
            document.getElementById('edit-skill-name').value = skill.name || '';
            document.getElementById('edit-skill-english').value = skill.english || '';
            document.getElementById('edit-skill-priority').value = skill.priority || 1;
            document.getElementById('edit-skill-maxLevel').value = skill.maxLevel || 15;

            modal.classList.add('active');
            modal.dataset.skillId = skill.id;
            modal.dataset.isRoot = isRoot;
        }

        // Skill-Editor schließen
        function closeSkillEditor() {
            const modal = document.getElementById('skill-editor-modal');
            if (modal) {
                modal.classList.remove('active');
            }
        }

        // Skill-Editor speichern
        function saveSkillEditor() {
            const modal = document.getElementById('skill-editor-modal');
            if (!modal) return;

            const skillId = modal.dataset.skillId;
            const isRoot = modal.dataset.isRoot === 'true';

            const updatedSkill = {
                id: skillId,
                icon: document.getElementById('edit-skill-icon').value,
                name: document.getElementById('edit-skill-name').value,
                english: document.getElementById('edit-skill-english').value,
                priority: parseInt(document.getElementById('edit-skill-priority').value),
                maxLevel: parseInt(document.getElementById('edit-skill-maxLevel').value)
            };

            // In savedData speichern
            if (!savedData['skill-edits']) {
                savedData['skill-edits'] = {};
            }
            savedData['skill-edits'][skillId] = updatedSkill;

            localStorage.setItem('d4Builds', JSON.stringify(savedData));

            closeSkillEditor();

            // Neu rendern
            const activeClass = document.querySelector('.class-card.active');
            if (activeClass) {
                renderBuilds(activeClass.dataset.class);
            }
        }

        // Quick-Priority setzen
        function setPriority(priority) {
            document.getElementById('edit-skill-priority').value = priority;
        }

        // Link kopieren
        function copyBuildLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('Link in die Zwischenablage kopiert!');
            });
        }

        // Statistiken aktualisieren
        function updateStats() {
            let totalBuilds = 0;
            let sTierCount = 0;
            let savedNotes = 0;

            Object.values(buildsData).forEach(classData => {
                classData.builds.forEach(build => {
                    totalBuilds++;
                    if (build.tier === 'S') sTierCount++;
                });
            });

            // Kriegspläne mitzählen
            totalBuilds += warplansData.length;

            savedNotes = Object.values(savedData).filter(data => data.note).length;

            document.getElementById('total-builds').textContent = totalBuilds;
            document.getElementById('s-tier-count').textContent = sTierCount;
            document.getElementById('saved-notes').textContent = savedNotes;
        }

        // Event Listener
        function setupEventListeners() {
            document.getElementById('search-input').addEventListener('input', () => {
                const activeClass = document.querySelector('.class-card.active');
                if (activeClass) {
                    renderBuilds(activeClass.dataset.class);
                }
            });

            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    const activeClass = document.querySelector('.class-card.active');
                    if (activeClass) {
                        renderBuilds(activeClass.dataset.class);
                    }
                });
            });
        }

        // Export
        function exportData() {
            const dataStr = JSON.stringify(savedData, null, 2);
            const blob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `d4-builds-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        // Import
        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const imported = JSON.parse(event.target.result);
                        savedData = {...savedData, ...imported};
                        localStorage.setItem('d4Builds', JSON.stringify(savedData));
                        alert('Daten erfolgreich importiert!');
                        updateStats();
                    } catch (err) {
                        alert('Fehler beim Importieren der Datei.');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        // Clear
        function clearData() {
            if (confirm('Möchtest du wirklich alle gespeicherten Daten löschen?')) {
                savedData = {};
                localStorage.removeItem('d4Builds');
                updateStats();
                alert('Alle Daten gelöscht!');
            }
        }

        // Start
        init();
    </script>
</body>
</html>
